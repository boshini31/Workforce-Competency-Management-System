<!DOCTYPE html>
<html>
<head>
    <title>Employee Analysis</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f4f6f9; }
        .topbar {
            background: #3f6db3; color: white; padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .topbar a { color: white; text-decoration: none; margin-left: 15px; }
        .container { margin: 25px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .filter-row { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 16px; border: none; background: #3f6db3;
            color: white; border-radius: 5px; cursor: pointer; font-size: 14px;
        }
        .filter-btn:hover { background: #2f5fa7; }
        .filter-btn.active { background: #1e3f73; }
        .back-btn {
            padding: 8px 15px; background: #ccc; color: #333;
            border-radius: 5px; text-decoration: none; font-size: 14px;
        }
        .search-input {
            padding: 8px 12px; border: 1px solid #ccc;
            border-radius: 5px; font-size: 14px; width: 220px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #3f6db3; color: white; padding: 10px; text-align: center; }
        td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
        tr:hover { background: #f0f4ff; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .badge-high   { background: #d4edda; color: #155724; }
        .badge-medium { background: #fff3cd; color: #856404; }
        .badge-low    { background: #f8d7da; color: #721c24; }
        #recordCount  { font-size: 13px; color: #555; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="topbar">
    <h2 style="margin:0;">Employee Analysis</h2>
    <div>
        <a href="dashboard.html">Dashboard</a>
        <a href="upload.html">Upload</a>
        <a href="performance.html">Performance</a>
        <a href="admin.html">Admin</a>
    </div>
</div>

<div class="container">
    <div class="filter-row">
        <button class="filter-btn active" id="btn-all"        onclick="filterData('all',        this)">All</button>
        <button class="filter-btn"        id="btn-weekly"     onclick="filterData('weekly',     this)">Weekly</button>
        <button class="filter-btn"        id="btn-quarterly"  onclick="filterData('quarterly',  this)">Quarterly</button>
        <button class="filter-btn"        id="btn-halfyearly" onclick="filterData('halfyearly', this)">Half Yearly</button>
        <button class="filter-btn"        id="btn-yearly"     onclick="filterData('yearly',     this)">Yearly</button>
        <input  class="search-input" id="searchBox" placeholder="Search name or skill..." oninput="applySearch()">
        <a href="dashboard.html" class="back-btn">⬅ Back</a>
    </div>

    <p id="recordCount"></p>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Skill</th>
                <th>Category</th>
                <th>Assigned Project</th>
                <th>Recommended Course</th>
            </tr>
        </thead>
        <tbody id="employeeTable"></tbody>
    </table>
</div>

<script>
const API = "http://127.0.0.1:8000";

// Guard
if(!localStorage.getItem("loggedInUser")){
    window.location.href = "login.html";
}

let allData     = [];
let currentType = 'all';

window.onload = async function(){
    // Try backend first, fallback to localStorage
    try {
        const res = await fetch(`${API}/employees`);
        allData   = await res.json();
        localStorage.setItem("employeeData", JSON.stringify(allData));
    } catch(e) {
        allData = JSON.parse(localStorage.getItem("employeeData")) || [];
    }
    loadTable(allData);
}

// ✅ Correct column names: name, skill, category, project, course
function loadTable(data){
    const table = document.getElementById("employeeTable");
    table.innerHTML = "";
    document.getElementById("recordCount").textContent = `Showing ${data.length} record(s)`;

    if(data.length === 0){
        table.innerHTML = `<tr><td colspan="6" style="color:#999;padding:20px;">No records found.</td></tr>`;
        return;
    }

    data.forEach((emp, i) => {
        const cat        = (emp.category || "").toLowerCase();
        const badgeClass = cat === "high" ? "badge-high" : cat === "medium" ? "badge-medium" : "badge-low";
        table.innerHTML += `<tr>
            <td>${i + 1}</td>
            <td>${emp.name     || "-"}</td>
            <td>${emp.skill    || "-"}</td>
            <td><span class="badge ${badgeClass}">${emp.category || "-"}</span></td>
            <td>${emp.project  || "-"}</td>
            <td>${emp.course   || "-"}</td>
        </tr>`;
    });
}

function filterData(type, btn){
    currentType = type;

    // Update active button style
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    if(btn) btn.classList.add("active");

    applySearch();
}

function applySearch(){
    const q = document.getElementById("searchBox").value.toLowerCase();

    const filtered = allData.filter(emp => {
        const matchSearch = !q ||
            (emp.name  || "").toLowerCase().includes(q) ||
            (emp.skill || "").toLowerCase().includes(q);
        return matchSearch;
    });

    loadTable(filtered);
}
</script>

</body>
</html>
